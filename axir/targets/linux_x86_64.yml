schema_version: 1

# A target is selected by name as: ./targets/<target_name>.yml
name: linux_x86_64
description: Linux x86-64 System V ELF target for the AXIR bootstrap path.

platform:
  architecture: x86_64
  operating_system: linux
  executable_format: elf64
  endianness: little
  machine_word_bits: 64
  page_size: 4096

abi:
  calling_convention: system_v_amd64
  stack_alignment_bytes: 16
  integer_argument_registers: [rdi, rsi, rdx, rcx, r8, r9]
  floating_argument_registers: [xmm0, xmm1, xmm2, xmm3, xmm4, xmm5, xmm6, xmm7]
  integer_return_register: rax
  floating_return_register: xmm0
  stack_pointer_register: rsp
  frame_pointer_register: rbp
  instruction_pointer_register: rip
  caller_saved_registers: [rax, rcx, rdx, rsi, rdi, r8, r9, r10, r11, xmm0, xmm1, xmm2, xmm3, xmm4, xmm5, xmm6, xmm7, xmm8, xmm9, xmm10, xmm11, xmm12, xmm13, xmm14, xmm15]
  callee_saved_registers: [rbx, rbp, r12, r13, r14, r15]

elf:
  file_type: ET_EXEC
  machine: EM_X86_64
  entry_symbol: _start
  base_virtual_address: 4194304
  text_section_alignment: 16
  data_section_alignment: 16
  bss_section_alignment: 16

integer_register_class:
  allocatable: [rax, rbx, rcx, rdx, rsi, rdi, r8, r9, r10, r11, r12, r13, r14, r15]
  scratch: [rax, rcx, rdx, r10, r11]

floating_register_class:
  allocatable: [xmm0, xmm1, xmm2, xmm3, xmm4, xmm5, xmm6, xmm7, xmm8, xmm9, xmm10, xmm11, xmm12, xmm13, xmm14, xmm15]
  scratch: [xmm14, xmm15]

immediates:
  signed_bits: [8, 32, 64]
  unsigned_bits: [8, 32, 64]
  branch_relative_bits: 32
  relocations:
    absolute_64: R_X86_64_64
    pc_relative_32: R_X86_64_PC32

# Every opcode template contains bytes copied directly to the emitted ELF image.
# `rex_modrm`, `opcode_plus_register`, `imm8`, `imm32`, `imm64`, and `rel32`
# are byte fields filled by the internal backend; no assembly text is created.
encoding:
  template_fields: [rex_modrm, opcode_plus_register, imm8, imm32, imm64, rel32]
  integer:
    mov_r64_r64: {bytes: [0x48, 0x89], field: rex_modrm}
    mov_r64_imm64: {bytes: [0x48, 0xb8], field: opcode_plus_register_imm64}
    add_r64_r64: {bytes: [0x48, 0x01], field: rex_modrm}
    sub_r64_r64: {bytes: [0x48, 0x29], field: rex_modrm}
    imul_r64_r64: {bytes: [0x48, 0x0f, 0xaf], field: rex_modrm}
    and_r64_r64: {bytes: [0x48, 0x21], field: rex_modrm}
    or_r64_r64: {bytes: [0x48, 0x09], field: rex_modrm}
    xor_r64_r64: {bytes: [0x48, 0x31], field: rex_modrm}
    cmp_r64_r64: {bytes: [0x48, 0x39], field: rex_modrm}
    test_r64_r64: {bytes: [0x48, 0x85], field: rex_modrm}
    idiv_r64: {bytes: [0x48, 0xf7], field: rex_modrm_digit_7}
    div_r64: {bytes: [0x48, 0xf7], field: rex_modrm_digit_6}
    cqo: {bytes: [0x48, 0x99]}
    xor_rdx_rdx: {bytes: [0x48, 0x31, 0xd2]}
    shl_r64_cl: {bytes: [0x48, 0xd3], field: rex_modrm_digit_4}
    shr_r64_cl: {bytes: [0x48, 0xd3], field: rex_modrm_digit_5}
    sar_r64_cl: {bytes: [0x48, 0xd3], field: rex_modrm_digit_7}
  comparisons:
    sete: {bytes: [0x0f, 0x94], field: rex_modrm}
    setne: {bytes: [0x0f, 0x95], field: rex_modrm}
    setl: {bytes: [0x0f, 0x9c], field: rex_modrm}
    setg: {bytes: [0x0f, 0x9f], field: rex_modrm}
    setle: {bytes: [0x0f, 0x9e], field: rex_modrm}
    setge: {bytes: [0x0f, 0x9d], field: rex_modrm}
    setb: {bytes: [0x0f, 0x92], field: rex_modrm}
    seta: {bytes: [0x0f, 0x97], field: rex_modrm}
    setbe: {bytes: [0x0f, 0x96], field: rex_modrm}
    setae: {bytes: [0x0f, 0x93], field: rex_modrm}
  floating:
    addsd: {bytes: [0xf2, 0x0f, 0x58], field: rex_modrm}
    subsd: {bytes: [0xf2, 0x0f, 0x5c], field: rex_modrm}
    mulsd: {bytes: [0xf2, 0x0f, 0x59], field: rex_modrm}
    divsd: {bytes: [0xf2, 0x0f, 0x5e], field: rex_modrm}
    movsd: {bytes: [0xf2, 0x0f, 0x10], field: rex_modrm}
    cvtsi2sd: {bytes: [0xf2, 0x48, 0x0f, 0x2a], field: rex_modrm}
    cvttsd2si: {bytes: [0xf2, 0x48, 0x0f, 0x2c], field: rex_modrm}
  memory:
    load8u: {bytes: [0x48, 0x0f, 0xb6], field: rex_modrm}
    load8s: {bytes: [0x48, 0x0f, 0xbe], field: rex_modrm}
    load16u: {bytes: [0x48, 0x0f, 0xb7], field: rex_modrm}
    load16s: {bytes: [0x48, 0x0f, 0xbf], field: rex_modrm}
    load32u: {bytes: [0x8b], field: rex_modrm}
    load32s: {bytes: [0x48, 0x63], field: rex_modrm}
    load64: {bytes: [0x48, 0x8b], field: rex_modrm}
    store8: {bytes: [0x88], field: rex_modrm}
    store16: {bytes: [0x66, 0x89], field: rex_modrm}
    store32: {bytes: [0x89], field: rex_modrm}
    store64: {bytes: [0x48, 0x89], field: rex_modrm}
    loadf32: {bytes: [0xf3, 0x0f, 0x10], field: rex_modrm}
    loadf64: {bytes: [0xf2, 0x0f, 0x10], field: rex_modrm}
    storef32: {bytes: [0xf3, 0x0f, 0x11], field: rex_modrm}
    storef64: {bytes: [0xf2, 0x0f, 0x11], field: rex_modrm}
  control_flow:
    jmp_rel32: {bytes: [0xe9], field: rel32}
    jne_rel32: {bytes: [0x0f, 0x85], field: rel32}
    call_rel32: {bytes: [0xe8], field: rel32}
    call_r64: {bytes: [0xff], field: rex_modrm_digit_2}
    ret: {bytes: [0xc3]}
    syscall: {bytes: [0x0f, 0x05]}
    nop: {bytes: [0x90]}
  process_exit:
    mov_edi_imm32: {bytes: [0xbf], field: imm32}
    mov_eax_exit: {bytes: [0xb8, 0x3c, 0x00, 0x00, 0x00]}
    syscall: {bytes: [0x0f, 0x05]}

syscalls:
  convention: linux_x86_64
  number_register: rax
  argument_registers: [rdi, rsi, rdx, r10, r8, r9]
  results:
    success: rax
    error: negative_errno_in_rax
  direct:
    read: 0
    write: 1
    open: 2
    close: 3
    seek: 8
    stat: 4
    remove: 87
    mkdir: 83
    rmdir: 84
    time: 201
    sleep: 35
    exit: 60
  composite:
    read_file: [open, read, close]
    write_file: [open, write, close]

runtime_contract:
  input_path_argument: argv[1]
  output_path_argument: argv[2]
  source_encoding: utf-8
  exit_status_zero: success
  exit_status_nonzero: compilation_or_runtime_error
  note: >-
    The backend must generate ELF headers, program headers, section layout,
    relocations, and syscall argument marshalling directly. No external
    assembler or linker is permitted.
